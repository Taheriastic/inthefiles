services:
  inthefiles:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inthefiles
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/stats"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
